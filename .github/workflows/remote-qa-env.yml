# Remote QA Environment — 在 GitHub Actions runner 上起 arwebui（带 secrets
# 里的真实 API key）+ 一个真浏览器 executor，供外部 agent 做逐步决策的
# exploratory QA（agent 看上一步截图/状态 → 决定下一步 → 发指令）。
#
# 为什么长这样：Claude 远程沙箱的 egress 白名单只放行 GitHub 系域名
# （github.com / api.github.com / objects.githubusercontent.com…），一切
# 隧道服务（trycloudflare/ngrok/loca.lt/bore/serveo）全被 403。所以指令
# 与结果全部走 GitHub 自身：
#   指令下行:  repo owner 在 driver issue 上发 JSON comment
#   结果上行:  runner 执行后把结果 JSON 回帖、截图上传为 release asset
#              （agent 经 github.com/…/releases/download/ 下载，可达）
# cloudflared 隧道仍然会起（URL commit 到 main 的 qa/remote-env-url.txt +
# job summary），给"人"用手机/Mac 直接看同一环境——但 agent 不依赖它。
#
# 用法（agent 视角）：
#   1. dispatch 本 workflow（minutes 入参 = 存活时长）。
#   2. 轮询 issues 列表，找到标题 "qa-driver <run_id>" 的 issue（runner
#      建好后会带一条 "driver ready" 评论）。
#   3. 以 repo owner 身份发 comment 下指令（见下方 PROTOCOL），等 runner
#      回帖结果 JSON，从 release qa-driver-<run_id> 下载截图看图，决定
#      下一步。发 {"op":"end"} 或到时结束。
#
# PROTOCOL（issue comment，JSON，可包 ```json 围栏）：
#   {"n": <递增序号>, "steps": [
#     {"op":"viewport","w":390,"h":844}
#     {"op":"goto","url":"http://127.0.0.1:8788/"}
#     {"op":"click","selector":"text=New session"}
#     {"op":"fill","selector":"textarea","text":"..."}
#     {"op":"press","key":"Enter"}  {"op":"type","text":"..."}
#     {"op":"waitMs","ms":2000}  {"op":"waitSel","selector":".timeline"}
#     {"op":"waitText","text":"...","timeout":120000}
#     {"op":"eval","js":"document.title"}  {"op":"shot","name":"..."}
#     {"op":"scroll","y":600}  {"op":"reload"}  {"op":"end"}
#   ]}
#   安全：只接受 repo owner（ALLOWED_AUTHOR）的评论，其他人一律忽略。
#
# 会话数据经 actions/cache 跨 run 延续（与 phone-webui 相同机制、独立 key）。
name: remote-qa-env

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "Keep the environment up for this many minutes (max 340)"
        default: "60"
        type: string

# contents: write——commit 隧道 URL 回 main + 建 release 传截图；
# issues: write——建 driver issue、回帖结果。
permissions:
  contents: write
  issues: write

# 同时只保留一个实例。
concurrency:
  group: remote-qa-env
  cancel-in-progress: true

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          # 保留 GITHUB_TOKEN 凭据：发布 URL 那步要 push 回 main。
          persist-credentials: true
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd webui/frontend
          npm ci
          npm run build

      - name: Build ar + arwebui
        run: |
          go build -buildvcs=false -o bin/ar ./cmd/agentrunner
          (cd webui && go build -buildvcs=false -o ../bin/arwebui .)

      - name: Install driver deps (playwright-core + bubblewrap)
        run: |
          (cd qa/blackbox && npm install --silent)
          # bwrap 是 ar 执行 bash 命令的硬前置(QA-0718 实测缺它时所有
          # shell 步骤 denied),装上才能测真实的命令执行/diff 场景。
          sudo apt-get install -y -q bubblewrap
          # Ubuntu 24 runner 的 AppArmor 默认禁非特权 userns,bwrap 装了
          # 也起不来(QA-0718 第二轮实测);放开限制 bash 步骤才真能跑。
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Restore store from previous run
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.local/share/agentrunner
            runtime
          key: agentrunner-qa-store-${{ github.run_id }}
          restore-keys: |
            agentrunner-qa-store-

      - name: Start Web UI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          nohup ./bin/arwebui -ar "$PWD/bin/ar" -addr 127.0.0.1:8788 > webui.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8788/api/health > /dev/null 2>&1; then
              echo "web UI is up"
              exit 0
            fi
            sleep 1
          done
          echo "web UI did not come up:" >&2
          tail -50 webui.log >&2
          exit 1

      - name: Expose via cloudflared (for humans)
        run: |
          curl -fsSL -o cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          nohup ./cloudflared tunnel --no-autoupdate --url http://127.0.0.1:8788 > tunnel.log 2>&1 &
          URL=""
          for _ in $(seq 1 60); do
            URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' tunnel.log | head -1 || true)
            [ -n "$URL" ] && break
            sleep 1
          done
          # 隧道拿不到也不挡 driver（agent 不依赖隧道）。
          if [ -z "$URL" ]; then
            echo "cloudflared tunnel did not come up (non-fatal):" >&2
            cat tunnel.log >&2
            exit 0
          fi
          echo "TUNNEL_URL=$URL"
          echo "::notice title=Remote QA env::$URL"
          {
            echo "## Remote QA environment is up"
            echo ""
            echo "**URL: $URL**"
            echo "- Up for ${MINUTES_IN} minutes — cancel this run to stop earlier."
          } >> "$GITHUB_STEP_SUMMARY"
          # 带外发布：job 运行期间日志和 annotation 外部都读不到（404/空），
          # commit 回 main 是外部读者运行中拿 URL 的唯一可靠通道。
          git config user.name "remote-qa-env"
          git config user.email "actions@github.com"
          {
            echo "url: $URL"
            echo "run_id: ${{ github.run_id }}"
            echo "started_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "minutes: ${MINUTES_IN}"
          } > qa/remote-env-url.txt
          git add qa/remote-env-url.txt
          git commit -m "ci: remote-qa-env run ${{ github.run_id }} 隧道 URL [skip ci]"
          # --autostash:runner 工作区被 npm install/build 弄脏(lock 文件、
          # dist),裸 rebase 会拒绝并因 bash -e 杀掉整步(QA-0718 run
          # 29661951206 实翻);|| true 兜底网络抖动,重试循环消化。
          for i in 1 2 3 4 5; do
            git push origin HEAD:main && break
            git pull --rebase --autostash origin main || true
            sleep 2
          done
        env:
          MINUTES_IN: ${{ inputs.minutes }}

      - name: Remote driver loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: qa-driver-${{ github.run_id }}
          ALLOWED_AUTHOR: ${{ github.repository_owner }}
          MINUTES_IN: ${{ inputs.minutes }}
          RUN_ID: ${{ github.run_id }}
        run: |
          MINUTES=$(printf '%s' "$MINUTES_IN" | tr -dc '0-9'); MINUTES=${MINUTES:-60}
          [ "$MINUTES" -gt 340 ] && MINUTES=340
          export MINUTES

          gh release create "$RELEASE_TAG" --prerelease \
            --title "$RELEASE_TAG" \
            --notes "remote QA driver session for run $RUN_ID — screenshots land here as assets" \
            --repo "$GH_REPO"

          ISSUE_URL=$(gh issue create --repo "$GH_REPO" \
            --title "qa-driver $RUN_ID" \
            --body "Remote QA driver channel for run $RUN_ID. Post JSON commands as comments (owner only). Screenshots: release $RELEASE_TAG. Protocol: see .github/workflows/remote-qa-env.yml header.")
          export ISSUE_NUMBER="${ISSUE_URL##*/}"
          echo "driver issue: $ISSUE_URL (#$ISSUE_NUMBER)"

          # 通用 browser executor：турn-based,每条指令都由外部 agent 逐步下发。
          # 运行期生成、不入库——这不是测试脚本,是纯传输/执行层。
          cat > qa/blackbox/qa-remote-executor.mjs <<'EXECUTOR_EOF'
          import { execFileSync } from "node:child_process";
          import { chromium } from "playwright-core";

          const TOKEN = process.env.GH_TOKEN;
          const REPO = process.env.GH_REPO;
          const ISSUE = process.env.ISSUE_NUMBER;
          const TAG = process.env.RELEASE_TAG;
          const OWNER_LOGIN = process.env.ALLOWED_AUTHOR;
          const DEADLINE = Date.now() + parseInt(process.env.MINUTES, 10) * 60 * 1000;
          const API = "https://api.github.com";
          const H = {
            authorization: `Bearer ${TOKEN}`,
            accept: "application/vnd.github+json",
            "user-agent": "qa-remote-driver",
          };

          const log = (m) => console.log(`[driver] ${m}`);

          async function postComment(body) {
            await fetch(`${API}/repos/${REPO}/issues/${ISSUE}/comments`, {
              method: "POST",
              headers: { ...H, "content-type": "application/json" },
              body: JSON.stringify({ body }),
            });
          }

          async function allComments() {
            const out = [];
            for (let p = 1; p < 20; p++) {
              const r = await fetch(`${API}/repos/${REPO}/issues/${ISSUE}/comments?per_page=100&page=${p}`, { headers: H });
              const batch = await r.json();
              if (!Array.isArray(batch) || batch.length === 0) break;
              out.push(...batch);
              if (batch.length < 100) break;
            }
            return out;
          }

          const browser = await chromium.launch({
            executablePath: process.env.CHROME_PATH || "/usr/bin/google-chrome",
            args: ["--no-sandbox", "--disable-gpu"],
          });
          const ctx = await browser.newContext({ viewport: { width: 1280, height: 800 } });
          const page = await ctx.newPage();
          const consoleErrs = [];
          page.on("console", (m) => { if (m.type() === "error") consoleErrs.push(m.text().slice(0, 300)); });
          page.on("pageerror", (e) => consoleErrs.push("pageerror: " + String(e).slice(0, 300)));

          let shotIdx = 0;
          let shots = [];
          async function snap(name) {
            shotIdx++;
            const f = `shot-${String(shotIdx).padStart(3, "0")}-${String(name).replace(/[^a-z0-9-]/gi, "-").slice(0, 40)}.jpg`;
            try {
              await page.screenshot({ path: f, fullPage: true, type: "jpeg", quality: 60 });
              shots.push(f);
            } catch (e) {
              consoleErrs.push("screenshot failed: " + e.message);
            }
            return f;
          }

          async function digest() {
            try {
              return await page.evaluate(() => ({
                url: location.href,
                title: document.title,
                text: document.body ? document.body.innerText.slice(0, 3500) : "",
                scrollW: document.documentElement.scrollWidth,
                winW: innerWidth,
              }));
            } catch (e) {
              return { error: String(e) };
            }
          }

          async function runStep(s) {
            switch (s.op) {
              case "viewport": await page.setViewportSize({ width: s.w, height: s.h }); return;
              case "goto": await page.goto(s.url, { waitUntil: "domcontentloaded", timeout: s.timeout || 20000 }); return;
              case "click": await page.locator(s.selector).first().click({ timeout: s.timeout || 8000 }); return;
              case "fill": await page.locator(s.selector).first().fill(s.text, { timeout: s.timeout || 8000 }); return;
              case "press": await page.keyboard.press(s.key); return;
              case "type": await page.keyboard.type(s.text, { delay: 15 }); return;
              case "waitMs": await new Promise((r) => setTimeout(r, s.ms)); return;
              case "waitSel": await page.waitForSelector(s.selector, { timeout: s.timeout || 30000 }); return;
              case "waitText": await page.waitForFunction((t) => document.body.innerText.includes(t), s.text, { timeout: s.timeout || 120000 }); return;
              case "eval": return await page.evaluate(s.js);
              case "shot": await snap(s.name || "step"); return;
              case "scroll": await page.evaluate((y) => window.scrollBy(0, y), s.y ?? 600); return;
              case "reload": await page.reload({ waitUntil: "domcontentloaded" }); return;
              case "end": return "END";
              default: throw new Error("unknown op: " + s.op);
            }
          }

          let lastN = 0;
          let ended = false;
          await postComment(`driver ready — run ${process.env.RUN_ID}, release \`${TAG}\`, deadline in ${process.env.MINUTES} min. Post commands as owner-authored JSON comments.`);
          log("ready, polling for commands");

          while (!ended && Date.now() < DEADLINE) {
            let cmds = [];
            try {
              const comments = await allComments();
              for (const c of comments) {
                if (c.user?.login !== OWNER_LOGIN) continue;
                // 评论可能带 code fence 和客户端自动附加的尾注——取首个 { 到
                // 最后一个 } 的子串再 parse,而不是整体严格 parse。
                const b = (c.body || "").trim();
                const start = b.indexOf("{");
                const end = b.lastIndexOf("}");
                if (start === -1 || end <= start) continue;
                try {
                  const j = JSON.parse(b.slice(start, end + 1));
                  if (typeof j.n === "number" && j.n > lastN && Array.isArray(j.steps)) cmds.push(j);
                } catch {}
              }
            } catch (e) {
              log("poll error: " + e.message);
            }
            cmds.sort((a, b) => a.n - b.n);

            for (const cmd of cmds) {
              lastN = cmd.n;
              shots = [];
              consoleErrs.length = 0;
              const evalResults = [];
              let error = null;
              log(`executing command n=${cmd.n} (${cmd.steps.length} steps)`);
              for (const s of cmd.steps) {
                try {
                  const r = await runStep(s);
                  if (r === "END") { ended = true; break; }
                  if (s.op === "eval") evalResults.push({ js: String(s.js).slice(0, 80), result: r });
                } catch (e) {
                  error = `step ${s.op}: ${String(e.message || e).slice(0, 500)}`;
                  break;
                }
              }
              await snap("final");
              const d = await digest();
              for (const f of shots) {
                try {
                  execFileSync("gh", ["release", "upload", TAG, f, "--clobber", "--repo", REPO], { stdio: "inherit" });
                } catch (e) {
                  log("asset upload failed: " + e.message);
                }
              }
              const result = { n: cmd.n, ok: !error, error, evalResults, consoleErrors: consoleErrs.slice(0, 10), shots, page: d };
              await postComment("```json\n" + JSON.stringify(result, null, 1).slice(0, 60000) + "\n```");
              if (ended) break;
            }

            if (!ended) await new Promise((r) => setTimeout(r, 3000));
          }

          log("driver loop done (ended=" + ended + ")");
          await browser.close();
          EXECUTOR_EOF

          (cd qa/blackbox && node qa-remote-executor.mjs)

          gh issue close "$ISSUE_NUMBER" --repo "$GH_REPO" \
            --comment "driver session over (run $RUN_ID)." || true

      # 诊断转储:QA-0718 G39(子 agent 后台工作无终态)只有 daemon 侧
      # 数据能解释。driver 结束后把会话清单、逐会话 events 导出与 daemon
      # log 传成 release asset,外部 agent 可下载下钻。
      - name: Dump daemon diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: qa-driver-${{ github.run_id }}
        run: |
          mkdir -p diag
          ./bin/ar sessions > diag/sessions.txt 2>&1 || true
          for sid in $(./bin/ar sessions 2>/dev/null | grep -oE '20[0-9]{6}-[0-9]{6}-[a-z0-9-]+' | sort -u); do
            ./bin/ar events "$sid" > "diag/events-$sid.txt" 2>&1 || true
          done
          # 子 agent 的 store 住在 <session-store>/sub/<callid>-a1/,不入
          # `ar sessions`——G39 定因需要它们的 journal(child 是否卡在
          # waiting:approval)。journal 落盘前已过 redaction,可入公开 asset。
          find ~/.local/share/agentrunner -path '*/sub/*' -name '*.jsonl' \
            -exec sh -c 'mkdir -p diag/sub && cp "$1" "diag/sub/$(echo "$1" | tr / _)"' _ {} \; 2>/dev/null || true
          cp ~/.local/share/agentrunner/daemon.log diag/daemon.log 2>/dev/null || true
          cp webui.log diag/webui.log 2>/dev/null || true
          tar czf qa-diagnostics.tar.gz diag
          gh release upload "$RELEASE_TAG" qa-diagnostics.tar.gz --clobber --repo "${{ github.repository }}" || true

      - name: Save store for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.local/share/agentrunner
            runtime
          key: agentrunner-qa-store-${{ github.run_id }}
