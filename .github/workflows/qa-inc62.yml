# QA-62 真实 API 闸门（INC-62 standing approval，G35）——在 Actions runner
# 上用 repo secrets 里的 GEMINI_API_KEY 跑 gate B（开发容器无法全量跑真实
# API 时的替代执行环境；scratch，不碰任何共享 store）。
#
# 用法：Actions → qa-inc62 → Run workflow。绿 = G35/SPEC 行可回 ✅。
name: qa-inc62

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-inc62
  cancel-in-progress: true

jobs:
  qa62:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build ar
        run: go build -buildvcs=false -o bin/ar ./cmd/agentrunner

      - name: Run QA-62 (real Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          chmod +x qa/run-qa62.sh
          qa/run-qa62.sh bin/ar 2>&1 | tee qa62-output.log
          echo "## QA-62 verdict" >> "$GITHUB_STEP_SUMMARY"
          tail -20 qa62-output.log >> "$GITHUB_STEP_SUMMARY"

      - name: Archive run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa62-run
          path: |
            qa62-output.log
            qa/runs/
            /tmp/qa62-*/daemon.log
          if-no-files-found: warn
