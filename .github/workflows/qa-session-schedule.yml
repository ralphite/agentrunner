# QA-74 (INC-74 B 闸): session 内 schedule 真实 API 验收。
# 手动 dispatch;GEMINI_API_KEY 走 repo secrets(本地容器无 key 时的
# 指定跑法,见 CLAUDE.md 测试环境节)。spec 无 execute 工具,不需沙箱。
name: qa-session-schedule
on:
  workflow_dispatch: {}
jobs:
  qa74:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache: true
      # bash 工具的 OS 沙箱（决策 #34 fail-closed）：统一配方一行接入
      # （装 bubblewrap + AppArmor userns 放开 + 真实 probe，INC-75）。
      - name: Setup AgentRunner environment (sandbox deps)
        uses: ./.github/actions/setup-ar

      - name: Build ar
        run: go build -o bin/ar ./cmd/agentrunner
      - name: Run QA-74
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVIDENCE_DIR: ${{ github.workspace }}/qa74-evidence
        run: bash qa/run-qa74.sh bin/ar
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa74-evidence
          path: qa74-evidence/
          if-no-files-found: warn
