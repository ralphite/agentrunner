name: storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: webui/frontend
        run: npm ci

      - name: Install Chromium
        working-directory: webui/frontend
        run: npx playwright install --with-deps chromium

      - name: Run production and Storybook gates
        run: ./scripts/check-webui.sh --skip-install

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            webui/frontend/storybook-static
            webui/frontend/test-results
            webui/frontend/playwright-report
