<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentRunner Cockpit</title>
<style>
  :root { --line:#ddd; --ink:#222; --dim:#888; --bg:#fafafa; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px; background:#fff; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; background:#c33; display:inline-block; }
  .dot.up { background:#2a2; }
  .muted { color:var(--dim); font-size:12px; }
  button { font:inherit; padding:3px 10px; border:1px solid #bbb; border-radius:5px; background:#fff; cursor:pointer; }
  button:hover { background:#f0f0f0; }
  button.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
  button.primary:hover { background:#1d4ed8; }
  button.danger { color:#b91c1c; border-color:#e5b4b4; }
  button:disabled { opacity:.45; cursor:default; }
  #layout { flex:1; display:flex; min-height:0; }
  aside { width:230px; border-right:1px solid var(--line); background:#fff; overflow-y:auto; }
  aside .sess { padding:8px 10px; border-bottom:1px solid #f0f0f0; cursor:pointer; }
  aside .sess:hover { background:#f6f6f6; }
  aside .sess.cur { background:#eef2ff; }
  aside .sess .id { font-family:ui-monospace,monospace; font-size:12px; }
  main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #sesshead { display:flex; align-items:center; gap:8px; padding:6px 12px; background:#fff; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  #sesshead .id { font-family:ui-monospace,monospace; font-size:12px; }
  .pill { font-size:11px; padding:1px 8px; border-radius:9px; background:#eee; color:#555; }
  .pill.idle { background:#dcfce7; color:#166534; }
  .pill.run { background:#fef3c7; color:#92400e; }
  .pill.appr { background:#ede9fe; color:#5b21b6; }
  .pill.closed { background:#e5e5e5; color:#555; }
  .pill.crash { background:#fee2e2; color:#991b1b; }
  #timeline { flex:1; overflow-y:auto; padding:14px 16px; }
  .turn { text-align:center; color:var(--dim); font-size:11px; margin:14px 0 6px; }
  .turn::before,.turn::after { content:"— "; }
  .row { margin:6px 0; display:flex; }
  .row.user { justify-content:flex-end; }
  .bubble { max-width:72%; padding:7px 11px; border-radius:10px; white-space:pre-wrap; word-break:break-word; }
  .user .bubble { background:#dbeafe; }
  .asst .bubble { background:#fff; border:1px solid var(--line); }
  .bubble.typing { border-style:dashed; color:#555; }
  .bubble.pending { opacity:.6; }
  .tag { font-size:10px; color:var(--dim); margin:0 6px; align-self:flex-end; }
  .card { margin:6px 0 6px 24px; border:1px solid var(--line); border-radius:8px; background:#fff; max-width:80%; font-size:13px; overflow:hidden; }
  .card .head { padding:4px 10px; background:#f4f4f5; font-family:ui-monospace,monospace; font-size:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .card pre { margin:0; padding:6px 10px; overflow-x:auto; font-size:12px; max-height:240px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
  .card.err .head { background:#fee2e2; }
  .card.cancel .head { background:#ffedd5; }
  .card details summary { cursor:pointer; padding:3px 10px; color:var(--dim); font-size:12px; }
  .badge { font-size:10px; padding:0 6px; border-radius:8px; background:#e5e7eb; color:#444; }
  .badge.ok { background:#dcfce7; color:#166534; }
  .badge.err { background:#fee2e2; color:#991b1b; }
  .sys { color:var(--dim); font-size:11px; margin:2px 0 2px 24px; font-family:ui-monospace,monospace; display:none; }
  body.showsys .sys { display:block; }
  .chip { display:inline-block; margin:4px 0 4px 24px; font-size:12px; padding:2px 10px; border-radius:10px; background:#f1f5f9; border:1px solid #e2e8f0; }
  .chip.warn { background:#fff7ed; border-color:#fed7aa; }
  .chip.bad { background:#fef2f2; border-color:#fecaca; }
  .approval { border:1px solid #c4b5fd; }
  .approval .head { background:#ede9fe; }
  .approval .act { padding:6px 10px; display:flex; gap:8px; align-items:center; }
  .approval input { flex:1; font:inherit; padding:3px 6px; border:1px solid #ccc; border-radius:4px; }
  #children { border-top:1px solid var(--line); background:#fff; padding:4px 12px; font-size:12px; display:none; }
  #children.on { display:block; }
  #children .task { display:flex; gap:8px; align-items:center; padding:2px 0; font-family:ui-monospace,monospace; }
  #composer { border-top:1px solid var(--line); background:#fff; padding:8px 12px; }
  #imgchips { display:flex; gap:6px; flex-wrap:wrap; }
  #imgchips .chip { margin:0 0 6px; cursor:pointer; }
  #composer .box { display:flex; gap:8px; align-items:flex-end; }
  textarea { flex:1; font:inherit; padding:7px 9px; border:1px solid #ccc; border-radius:7px; resize:vertical; min-height:38px; max-height:180px; }
  #statusline { font-size:11px; color:var(--dim); padding:2px 2px 0; }
  dialog { border:1px solid #bbb; border-radius:10px; padding:0; width:min(760px,92vw); }
  dialog::backdrop { background:rgba(0,0,0,.25); }
  dialog .dhead { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--line); font-weight:600; }
  dialog .dbody { padding:12px 14px; max-height:72vh; overflow-y:auto; }
  dialog label { display:block; font-size:12px; color:#555; margin:10px 0 3px; }
  dialog input[type=text], dialog select { width:100%; font:inherit; padding:5px 8px; border:1px solid #ccc; border-radius:5px; }
  dialog textarea { width:100%; font:12px/1.4 ui-monospace,monospace; }
  #viewer pre { font-size:12px; white-space:pre-wrap; word-break:break-all; }
  #toast { position:fixed; right:14px; bottom:14px; max-width:420px; background:#7f1d1d; color:#fff; padding:10px 14px; border-radius:8px; font-size:13px; white-space:pre-wrap; display:none; z-index:50; }
  #empty { margin:auto; color:var(--dim); text-align:center; }
</style>
</head>
<body>
<header>
  <h1>AgentRunner Cockpit</h1>
  <span class="dot" id="hdot"></span>
  <span class="muted" id="htext">daemon…</span>
  <button id="daemonRestart" style="display:none" class="danger">restart daemon</button>
  <span style="flex:1"></span>
  <label class="muted"><input type="checkbox" id="sysToggle"> system events</label>
  <button class="primary" id="btnNew">new session</button>
</header>
<div id="layout">
  <aside id="sesslist"></aside>
  <main>
    <div id="sesshead" style="display:none">
      <a id="shUp" style="display:none">← parent session</a>
      <span class="id" id="shId"></span>
      <span class="pill" id="shPill">—</span>
      <span style="flex:1"></span>
      <button id="btnRaw">raw journal</button>
      <button id="btnState">fold state</button>
      <button id="btnTree">inspect tree</button>
      <button id="btnAgent">switch agent</button>
      <button id="btnInterrupt" class="danger">interrupt</button>
    </div>
    <div id="timeline"><div id="empty">← select or create a session</div></div>
    <div id="children"></div>
    <div id="composer" style="display:none">
      <div id="imgchips"></div>
      <div class="box">
        <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for a newline)"></textarea>
        <input type="file" id="file" accept="image/*" style="display:none">
        <button id="btnImg" title="attach an image">image</button>
        <button class="primary" id="btnSend">send</button>
      </div>
      <div id="statusline"></div>
    </div>
  </main>
</div>

<dialog id="newdlg">
  <div class="dhead">new session <button onclick="newdlg.close()">✕</button></div>
  <div class="dbody">
    <label>workspace directory (absolute path)</label>
    <div style="display:flex;gap:8px">
      <input type="text" id="nWs" placeholder="/path/to/workspace">
      <button id="nMkWs" style="white-space:nowrap">make empty workspace</button>
    </div>
    <label>opening message</label>
    <textarea id="nMsg" rows="2" style="font:inherit">Hello — in one sentence, introduce your tool capabilities.</textarea>
    <label>mode (optional)</label>
    <select id="nMode"><option value="">default</option><option>plan</option><option>acceptEdits</option></select>
    <label>base.yaml (main agent spec)</label>
    <textarea id="nSpec" rows="12"></textarea>
    <label>worker.yaml (sub-agent spec; leave empty to skip)</label>
    <textarea id="nWorker" rows="7"></textarea>
    <div style="margin-top:12px;text-align:right"><button class="primary" id="nCreate">create</button></div>
  </div>
</dialog>

<dialog id="agentdlg">
  <div class="dhead">switch agent (same session, context carries over) <button onclick="agentdlg.close()">✕</button></div>
  <div class="dbody">
    <label>new agent spec (agent.yaml)</label>
    <textarea id="aSpec" rows="10"></textarea>
    <label>worker.yaml (sibling sub-agent spec; leave empty to skip)</label>
    <textarea id="aWorker" rows="5"></textarea>
    <div style="margin-top:12px;text-align:right"><button class="primary" id="aSwitch">switch (takes effect on the next message)</button></div>
  </div>
</dialog>

<dialog id="viewer">
  <div class="dhead"><span id="vTitle">viewer</span> <button onclick="viewer.close()">✕</button></div>
  <div class="dbody"><pre id="vBody"></pre></div>
</dialog>

<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const state = {
  sid: null, cursor: 0, evTimer: null, psTimer: null, es: null,
  toolCards: {}, callArgs: {}, approvals: {}, pending: [],
  typingEl: null, status: "—", images: [], lastGen: 0,
};

// ---------- helpers ----------
async function api(path, opts) {
  const r = await fetch("/api" + path, opts);
  const text = await r.text();
  let body = {};
  try { body = text ? JSON.parse(text) : {}; } catch { body = { error: text }; }
  if (!r.ok) throw new Error((body.error || r.statusText) + (body.stderr ? "\n" + body.stderr : ""));
  return body;
}
const post = (path, body) => api(path, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body || {}) });
function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 7000);
}
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function pretty(raw) {
  if (raw == null) return "";
  try { return JSON.stringify(typeof raw === "string" ? JSON.parse(raw) : raw, null, 2); }
  catch { return String(raw); }
}
const short = id => (id || "").slice(0, 14);

// ---------- timeline append ----------
const tl = $("timeline");
function append(node) {
  const nearBottom = tl.scrollHeight - tl.scrollTop - tl.clientHeight < 60;
  tl.appendChild(node);
  if (nearBottom) tl.scrollTop = tl.scrollHeight;
}
function sysline(seq, type, extra) {
  append(el("div", "sys", `#${seq} ${type}${extra ? " " + extra : ""}`));
}
function chip(text, cls) { append(el("div", "chip " + (cls || ""), text)); }

// childChip renders a spawn/settle chip with a link into the child session
// (INC-1: child ids are addressable, the timeline is browsable live).
function childChip(text, childSession, cls) {
  const c = el("div", "chip " + (cls || ""), text + " ");
  if (childSession) {
    const a = el("a", "", "open child ↗");
    a.href = "#" + childSession;
    c.appendChild(a);
  }
  append(c);
}

function bubble(role, text, tags) {
  const row = el("div", "row " + role);
  const b = el("div", "bubble", text);
  if (role === "user") { if (tags) row.appendChild(el("span","tag",tags)); row.appendChild(b); }
  else { row.appendChild(b); if (tags) row.appendChild(el("span","tag",tags)); }
  append(row);
  return b;
}

function toolCard(name, args, opts) {
  const card = el("div", "card");
  const head = el("div", "head");
  head.appendChild(el("span", "", "🔧 " + name));
  const status = el("span", "badge", opts && opts.background ? "background" : "running");
  head.appendChild(status);
  card.appendChild(head);
  if (args) {
    const d = el("details"); d.appendChild(el("summary", "", "args"));
    const p = el("pre", "", pretty(args)); d.appendChild(p); card.appendChild(d);
  }
  card._status = status;
  append(card);
  return card;
}

// ---------- journal event rendering (DESIGN §5) ----------
function render(env) {
  const p = env.payload || {};
  switch (env.type) {
  case "session_started":
    chip(`session started · ${p.spec_name || ""} · ${p.model || ""}`);
    break;
  case "input_received": {
    // settle a matching pending bubble
    const i = state.pending.findIndex(x => x.text === p.text);
    if (i >= 0) { state.pending[i].el.classList.remove("pending"); state.pending[i].el._tag && (state.pending[i].el._tag.textContent="you"); state.pending.splice(i, 1); }
    else {
      let extra = p.source && p.source !== "user" ? p.source : "you";
      const b = bubble("user", p.text || "(empty)", extra);
      if (p.images && p.images.length) b.appendChild(el("div", "muted", `📷 ×${p.images.length} (CAS ref)`));
    }
    break;
  }
  case "generation_started":
    state.lastGen = p.gen_step || (state.lastGen + 1);
    append(el("div", "turn", `turn ${state.lastGen}`));
    setStatus("running", "run");
    break;
  case "assistant_message": {
    if (state.typingEl) { state.typingEl.parentElement.remove(); state.typingEl = null; }
    const parts = (p.message && p.message.parts) || [];
    let text = parts.filter(x => x.text).map(x => x.text).join("");
    const calls = parts.filter(x => x.tool_name);
    calls.forEach(c => { state.callArgs[c.call_id] = { name: c.tool_name, args: c.args }; });
    if (text.trim()) bubble("asst", text, "agent");
    if (calls.length && !text.trim()) {} // tool activity cards follow
    if (p.finish === "blocked") chip("output truncated (finish=blocked), partial text kept", "warn");
    break;
  }
  case "activity_started":
    if (p.kind === "tool") {
      state.toolCards[p.activity_id] = toolCard(p.name, p.args, { background: p.background });
    } else sysline(env.seq, env.type, p.name);
    break;
  case "activity_completed": {
    const card = state.toolCards[p.activity_id];
    if (card) {
      card._status.textContent = p.is_error ? "error" : "done";
      card._status.className = "badge " + (p.is_error ? "err" : "ok");
      if (p.usage) card._status.title = `tokens in ${p.usage.input_tokens} out ${p.usage.output_tokens}`;
      if (p.result !== undefined) {
        const d = el("details"); d.appendChild(el("summary", "", "result"));
        d.appendChild(el("pre", "", pretty(p.result).slice(0, 20000)));
        card.appendChild(d);
        if (p.is_error) card.classList.add("err");
      }
    } else sysline(env.seq, env.type, p.activity_id);
    break;
  }
  case "activity_failed": {
    const card = state.toolCards[p.activity_id];
    const msg = p.error ? `${p.error.class}: ${p.error.message}` : "failed";
    if (card) {
      card.classList.add("err");
      card._status.textContent = "failed" + (p.final ? " (final)" : ` (retry ${p.attempt})`);
      card._status.className = "badge err";
      card.appendChild(el("pre", "", msg));
    } else chip("activity failed: " + msg, "bad");
    break;
  }
  case "activity_cancelled": {
    const card = state.toolCards[p.activity_id];
    if (card) {
      card.classList.add("cancel");
      card._status.textContent = "cancelled";
      if (p.partial_output) {
        const d = el("details"); d.appendChild(el("summary", "", "partial output"));
        d.appendChild(el("pre", "", p.partial_output)); card.appendChild(d);
      }
    } else chip("activity cancelled " + p.activity_id, "warn");
    break;
  }
  case "spawn_requested":
    childChip(`⬇ spawn ${p.agent} · ${p.task ? p.task.slice(0, 80) : ""}`, p.child_session, "");
    break;
  case "subagent_completed":
    childChip(`⬆ ${p.agent} settled · ${p.reason} · ${p.usage ? (p.usage.input_tokens + p.usage.output_tokens) + " tok" : ""}`,
      p.child_session, p.reason === "completed" ? "" : "warn");
    break;
  case "approval_requested": renderApproval(env); break;
  case "approval_responded": {
    if (state.approvals[p.approval_id]) {
      settleApproval(p.approval_id,
        (p.decision === "approve" ? "approved" : "denied") + (p.reason ? ": " + p.reason : "") + ` (${p.source || ""})`,
        p.decision === "approve");
    } else sysline(env.seq, env.type, p.decision);
    break;
  }
  case "waiting_entered": {
    // After D2's quiescence surgery the wait kinds are just input/approval
    // (tasks/timer are gone).
    const kinds = { input: ["waiting: input", "idle"], approval: ["waiting: approval", "appr"] };
    const [txt, cls] = kinds[p.kind] || [p.kind, ""];
    setStatus(txt, cls);
    break;
  }
  case "waiting_resolved": setStatus("running", "run"); break;
  case "session_closed": {
    // Quiescence model (D2): session_closed is a MARK, not a terminal state
    // — reason ∈ closed|killed, kill marks carry source ∈ user|parent, and
    // an explicit send always reopens the session.
    const killed = p.reason === "killed";
    chip(`session marked ${killed ? "killed" : "closed"}${p.source ? " · source: " + p.source : ""} — send to continue`, killed ? "bad" : "");
    setStatus(killed ? "killed" : "closed", "closed");
    break;
  }
  case "spec_changed": chip(`🔁 agent switched → ${p.spec_name || ""} · ${p.model || ""}`); break;
  case "actor_crashed": chip(`crashed ${p.actor}: ${p.error}`, "bad"); setStatus("crashed", "crash"); break;
  case "mode_changed": chip(`mode → ${p.to} (${p.cause})`); break;
  case "context_compacted": chip(`context compacted · through turn ${p.upto_gen_step}`); break;
  case "limit_exceeded":
    // Visible-truncation family (tokens|generation_steps|malformed_tool_call):
    // the turn is cut short but the session does NOT end — it idles and can
    // be sent to again.
    chip(`truncated: ${p.kind}${p.limit ? ` ${p.used}/${p.limit}` : ""} (session stays available — send to continue)`, "bad");
    break;
  case "generation_discarded": chip(`turn ${p.gen_step} stream discarded, retrying`, "warn"); break;
  case "malformed_tool_call": chip(`turn ${p.gen_step} tool call unparsable, retrying`, "warn"); break;
  default:
    sysline(env.seq, env.type);
  }
}

// approvalCard renders one ask exactly once, whatever channel saw it first.
// A PARENT ask arrives twice (SSE approval_request + journal
// approval_requested); a CHILD ask arrives ONLY via SSE — child loops have
// no Out sink, but their approvals bubble through the shared broker with
// the requesting agent's name. Dedup by approval id.
function approvalCard(id, toolName, argsStr, agentName) {
  if (state.approvals[id]) return state.approvals[id];
  const card = el("div", "card approval");
  const head = el("div", "head");
  head.appendChild(el("span", "", "⚖ approval " + (toolName || id)));
  if (agentName) head.appendChild(el("span", "badge", "from: " + agentName));
  card.appendChild(head);
  if (argsStr) card.appendChild(el("pre", "", pretty(argsStr)));
  const act = el("div", "act");
  if (state.sid.includes("-sub-")) {
    // The broker registers asks under the ROOT session — answer from the
    // parent view; here the card is informational.
    act.appendChild(el("span", "badge", "answer from the parent session"));
    card.appendChild(act);
    card.act = act; card.head = head;
    state.approvals[id] = card;
    append(card);
    return card;
  }
  const reason = document.createElement("input"); reason.placeholder = "reason (optional)";
  const ok = el("button", "primary", "approve"), no = el("button", "danger", "deny");
  ok.onclick = () => decide("approve"); no.onclick = () => decide("deny");
  act.append(ok, no, reason); card.appendChild(act);
  async function decide(d) {
    ok.disabled = no.disabled = true;
    try {
      await post(`/sessions/${state.sid}/approve`, { approvalId: id, decision: d, reason: reason.value });
      // A child's ask never gets a journal approval_responded in THIS
      // session's log — settle the card locally on ack.
      settleApproval(id, d === "approve" ? "approved (you)" : "denied (you)" + (reason.value ? ": " + reason.value : ""), d === "approve");
    } catch (e) { toast(e.message); ok.disabled = no.disabled = false; }
  }
  card.act = act;
  card.head = head;
  state.approvals[id] = card;
  append(card);
  return card;
}

function settleApproval(id, text, approved) {
  const a = state.approvals[id];
  if (!a || !a.act) return;
  a.act.innerHTML = "";
  a.act.appendChild(el("span", "badge " + (approved ? "ok" : "err"), text));
  delete state.approvals[id];
}

function renderApproval(env) {
  const p = env.payload;
  const known = state.callArgs[p.call_id];
  const card = approvalCard(p.approval_id,
    known ? known.name : (p.call_id || p.approval_id),
    known && known.args ? known.args : "", null);
  // gate verdicts ride only the journal event — attach them when it lands
  if (card.head && !card._gated) {
    card._gated = true;
    (p.gate_results || []).forEach(g => {
      card.head.appendChild(el("span", "badge", `${g.gate}:${g.decision}${g.reason ? " " + g.reason : ""}`));
    });
  }
}

function setStatus(text, cls) {
  state.status = text;
  const pill = $("shPill");
  pill.textContent = text;
  pill.className = "pill " + (cls || "");
  $("statusline").textContent = text;
}

// ---------- session lifecycle ----------
async function openSession(id) {
  leaveSession();
  state.sid = id;
  location.hash = id;
  tl.innerHTML = "";
  Object.assign(state, { cursor: 0, toolCards: {}, callArgs: {}, approvals: {}, pending: [], typingEl: null, lastGen: 0 });
  // A child session (INC-1) is a read-only view: no inbox, no interrupt,
  // no live stream — its journal still grows while in flight, so the 1s
  // poll IS the realtime view. Everything else works unchanged.
  const isSub = id.includes("-sub-");
  $("sesshead").style.display = "flex";
  $("composer").style.display = isSub ? "none" : "block";
  $("btnInterrupt").style.display = $("btnAgent").style.display = isSub ? "none" : "";
  const up = $("shUp");
  up.style.display = isSub ? "" : "none";
  if (isSub) up.href = "#" + id.slice(0, id.lastIndexOf("-sub-"));
  $("shId").textContent = id;
  setStatus("loading…", "");
  document.querySelectorAll("#sesslist .sess").forEach(n => n.classList.toggle("cur", n.dataset.id === id));
  await pollEvents();
  state.evTimer = setInterval(pollEvents, 1000);
  state.psTimer = setInterval(pollPS, 2500);
  if (!isSub) openStream(id);
}
// leaveSession tears down the polling/stream for the current view (a UI
// navigation concern only — the session itself always keeps running).
function leaveSession() {
  clearInterval(state.evTimer); clearInterval(state.psTimer);
  if (state.es) { state.es.close(); state.es = null; }
  state.sid = null;
}

let pollBusy = false;
async function pollEvents() {
  if (!state.sid || pollBusy) return;
  pollBusy = true;
  try {
    const evs = await api(`/sessions/${state.sid}/events?after=${state.cursor}`);
    for (const e of evs) { render(e); state.cursor = Math.max(state.cursor, e.seq || 0); }
  } catch (e) { /* daemon down / transient: keep polling, health dot tells the story */ }
  finally { pollBusy = false; }
}

async function pollPS() {
  if (!state.sid) return;
  try {
    const tasks = await api(`/sessions/${state.sid}/ps`);
    const box = $("children");
    box.className = tasks.length ? "on" : "";
    box.innerHTML = "";
    if (tasks.length) {
      box.appendChild(el("div", "muted", `in-flight background work ×${tasks.length}`));
      const isSub = state.sid.includes("-sub-");
      tasks.forEach(t => {
        const row = el("div", "task");
        row.appendChild(el("span", "", `${t.handle}  ${t.tool}  ${t.detail || ""}`));
        // Child-session view is read-only: the daemon routes kill by TOP
        // session id, so grandchild tasks are killed from the root.
        if (!isSub) {
          const kill = el("button", "danger", "kill");
          kill.onclick = async () => {
            kill.disabled = true;
            try { await post(`/sessions/${state.sid}/kill`, { handle: t.handle }); }
            catch (e) { toast(e.message); kill.disabled = false; }
          };
          row.appendChild(kill);
        }
        box.appendChild(row);
      });
    }
  } catch (e) { /* ignore */ }
}

// ---------- SSE typing decoration ----------
function openStream(id) {
  const es = new EventSource(`/api/sessions/${id}/stream`);
  state.es = es;
  es.onmessage = m => {
    let e; try { e = JSON.parse(m.data); } catch { return; }
    if (e.kind === "text_delta" && e.text) {
      if (!state.typingEl) state.typingEl = bubble("asst", "", "streaming");
      state.typingEl.classList.add("typing");
      state.typingEl.textContent += e.text;
      const nearBottom = tl.scrollHeight - tl.scrollTop - tl.clientHeight < 120;
      if (nearBottom) tl.scrollTop = tl.scrollHeight;
    }
    if (e.kind === "discard" && state.typingEl) { state.typingEl.parentElement.remove(); state.typingEl = null; }
    // Child asks exist ONLY on this stream (they never touch the parent
    // journal): render live. e.text carries the requesting agent's name.
    if (e.kind === "approval_request" && e.approval_id) {
      approvalCard(e.approval_id, e.tool, e.args, e.text);
    }
  };
  es.addEventListener("end", () => es.close());
}

// ---------- composer actions ----------
$("btnSend").onclick = send;
$("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
async function send() {
  const text = $("input").value.trim();
  if (!text || !state.sid) return;
  const images = state.images.map(i => i.path);
  $("input").value = "";
  const b = bubble("user", text, "delivering…");
  b.classList.add("pending");
  b._tag = b.parentElement.querySelector(".tag");
  state.pending.push({ text, el: b });
  state.images = []; renderImgChips();
  try { await post(`/sessions/${state.sid}/send`, { text, images }); if (b._tag) b._tag.textContent = "queued"; }
  catch (e) { toast(e.message); b.parentElement.remove(); state.pending = state.pending.filter(x => x.el !== b); }
}
$("btnImg").onclick = () => $("file").click();
$("file").onchange = async () => {
  const f = $("file").files[0];
  if (!f) return;
  const fd = new FormData(); fd.append("file", f);
  try {
    const r = await api("/upload", { method: "POST", body: fd });
    state.images.push(r); renderImgChips();
  } catch (e) { toast(e.message); }
  $("file").value = "";
};
function renderImgChips() {
  const box = $("imgchips"); box.innerHTML = "";
  state.images.forEach((img, i) => {
    const c = el("span", "chip", "📷 " + img.name + " ✕");
    c.onclick = () => { state.images.splice(i, 1); renderImgChips(); };
    box.appendChild(c);
  });
}
$("btnInterrupt").onclick = async () => {
  if (!state.sid) return;
  try { await post(`/sessions/${state.sid}/interrupt`); chip("⚡ interrupt sent (cancels the in-flight turn; a no-op at idle, audit line only)", "warn"); }
  catch (e) { toast(e.message); }
};

// ---------- agent switch (spec decision #32) ----------
const agentdlg = $("agentdlg");
const DEFAULT_AGENT2 = `name: auditor
model: { provider: gemini, id: gemini-flash-latest, max_tokens: 4096 }
system_prompt: You are an auditor. Always open with "[AUDITOR]" and answer in one stern sentence.
tools: [read_file, bash]
permissions:
  - { action: allow }
`;
$("btnAgent").onclick = () => {
  if (!state.sid) return;
  if (!$("aSpec").value) $("aSpec").value = DEFAULT_AGENT2;
  agentdlg.showModal();
};
$("aSwitch").onclick = async () => {
  const btn = $("aSwitch"); btn.disabled = true;
  try {
    const extraSpecs = [];
    if ($("aWorker").value.trim()) extraSpecs.push({ name: "worker.yaml", content: $("aWorker").value });
    const r = await post(`/sessions/${state.sid}/agent`, { spec: $("aSpec").value, extraSpecs });
    agentdlg.close();
    chip(`🔁 ${r.status || "agent switched"} (lands in the journal as spec_changed)`);
  } catch (e) { toast(e.message); }
  finally { btn.disabled = false; }
};

// ---------- viewers ----------
async function view(title, path) {
  try {
    const data = await api(path);
    $("vTitle").textContent = title + " · " + state.sid;
    $("vBody").textContent = pretty(data);
    $("viewer").showModal();
  } catch (e) { toast(e.message); }
}
$("btnRaw").onclick = () => view("raw journal", `/sessions/${state.sid}/events`);
$("btnState").onclick = () => view("fold state", `/sessions/${state.sid}/state`);
$("btnTree").onclick = () => view("inspect tree", `/sessions/${state.sid}/inspect`);
$("sysToggle").onchange = e => document.body.classList.toggle("showsys", e.target.checked);

// ---------- sessions list / health ----------
async function refreshSessions() {
  try {
    const rows = await api("/sessions");
    const box = $("sesslist");
    box.innerHTML = "";
    rows.forEach(r => {
      const d = el("div", "sess" + (r.id === state.sid ? " cur" : ""));
      d.dataset.id = r.id;
      d.appendChild(el("div", "id", short(r.id)));
      d.appendChild(el("div", "muted", `${r.status} · ${r.turns} turns`));
      d.onclick = () => openSession(r.id);
      box.appendChild(d);
    });
  } catch (e) { /* health dot covers it */ }
}
async function refreshHealth() {
  try {
    const h = await api("/health");
    $("hdot").className = "dot" + (h.daemonUp ? " up" : "");
    $("htext").textContent = `${h.version} · daemon ${h.daemonUp ? "up" : "unreachable"}${h.daemonManaged ? " (managed)" : ""}`;
    $("daemonRestart").style.display = h.daemonUp ? "none" : "";
  } catch (e) {
    $("hdot").className = "dot";
    $("htext").textContent = "arweb unreachable";
  }
}
$("daemonRestart").onclick = async () => {
  try { await post("/daemon/start"); toast("daemon start requested"); }
  catch (e) { toast(e.message); }
};

// ---------- new session dialog ----------
const newdlg = $("newdlg"), viewer = $("viewer");
const DEFAULT_SPEC = `name: dev
model: { provider: gemini, id: gemini-flash-latest, max_tokens: 4096 }
system_prompt: |
  You are a rigorous coding assistant. Follow the user's instructions
  exactly; when asked to start sub-agents, use the spawn_agent tool with
  the exact count and division of labor requested; use kill to cancel.
tools: [read_file, write_file, edit_file, bash, spawn_agent, kill, output]
agents: [worker]
permissions:
  - { action: allow }
`;
const DEFAULT_WORKER = `name: worker
description: runs investigation/edit tasks assigned by the parent and reports back
model: { provider: gemini, id: gemini-flash-latest, max_tokens: 4096 }
system_prompt: When the task is done, report your conclusions as concise bullet points.
tools: [read_file, bash]
`;
$("btnNew").onclick = () => {
  if (!$("nSpec").value) $("nSpec").value = DEFAULT_SPEC;
  if (!$("nWorker").value) $("nWorker").value = DEFAULT_WORKER;
  newdlg.showModal();
};
$("nMkWs").onclick = async () => {
  try { $("nWs").value = (await post("/workspace")).path; }
  catch (e) { toast(e.message); }
};
$("nCreate").onclick = async () => {
  const btn = $("nCreate"); btn.disabled = true;
  try {
    const extraSpecs = [];
    if ($("nWorker").value.trim()) extraSpecs.push({ name: "worker.yaml", content: $("nWorker").value });
    const r = await post("/sessions", {
      spec: $("nSpec").value, extraSpecs,
      workspace: $("nWs").value.trim(), message: $("nMsg").value.trim(), mode: $("nMode").value,
    });
    newdlg.close();
    await refreshSessions();
    openSession(r.sid);
  } catch (e) { toast(e.message); }
  finally { btn.disabled = false; }
};

// ---------- boot ----------
refreshHealth(); refreshSessions();
setInterval(refreshHealth, 5000);
setInterval(refreshSessions, 4000);
if (location.hash.length > 1) openSession(location.hash.slice(1));
window.addEventListener("hashchange", () => {
  const id = location.hash.slice(1);
  if (id && id !== state.sid) openSession(id);
});
</script>
