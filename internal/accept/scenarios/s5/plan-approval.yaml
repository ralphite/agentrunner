id: s5-02-plan-approval-payload
title: plan 审批全流程——发布→审→拒(附理由)→v2→批,payload_ref 钉住版本
files:
  planner.yaml: |
    name: planner
    model: { provider: scripted, id: x }
    system_prompt: plan first
    tools: [bash]
  plan.yaml: |
    steps:
      - respond:
          - tool_call: { name: exit_plan_mode, args: { plan: "v1 rough idea" } }
          - finish: tool_use
      - expect:
          last_message_contains: "denied"
        respond:
          - tool_call: { name: exit_plan_mode, args: { plan: "v2 detailed steps, verified" } }
          - finish: tool_use
      - respond:
          - tool_call: { name: bash, args: { command: "echo executed > done.txt" } }
          - finish: tool_use
      - respond:
          - text: "plan executed"
          - finish: end_turn
steps:
  - run: >
      AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/plan.yaml
      AGENTRUNNER_APPROVE='deny:needs more detail,approve'
      $BIN run --workspace . --mode plan planner.yaml "make it so"
  - run: grep -q '"stream". "plan"' xdg/agentrunner/sessions/*/artifacts/manifest.json
  - run: test "$(grep -o 'payload_ref' xdg/agentrunner/sessions/*/events.jsonl | wc -l)" -ge 2
  - run: grep -q 'needs more detail' xdg/agentrunner/sessions/*/events.jsonl
expect:
  - exit_code: 0
  - file_contains: { path: done.txt, text: "executed" }
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
