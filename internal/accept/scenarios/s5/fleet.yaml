id: s5-01-researcher-fleet
title: researcher 编队(parent + 2 子 agent)产出带 contract 检查的报告 artifact
files:
  lead.yaml: |
    name: lead
    system_prompt: coordinate the research
    tools: [bash]
    agents: [researcher, reviewer]
    permissions:
      - { action: allow }
    outputs:
      - { name: report, path: report.md, required: true }
  researcher.yaml: |
    name: researcher
    description: digs into the topic
    system_prompt: research
    tools: [bash]
  reviewer.yaml: |
    name: reviewer
    description: checks the findings
    system_prompt: review
    tools: [bash]
  # spawn 一律非阻塞(零 legacy):route 按请求形态分流——lead 主线、
  # 两个子各自脚本、每份子回执入史后的 lead 后续段。
  fleet.yaml: |
    routes:
      - key: RESEARCH-JOB
        steps:
          - respond:
              - tool_call: { name: bash, args: { command: "echo finding-A > findings.md" } }
              - finish: tool_use
          - respond:
              - text: "researched: finding-A ready"
              - finish: end_turn
      - key: REVIEW-JOB
        steps:
          - respond:
              - text: "REVIEW-DONE: looks good"
              - finish: end_turn
      - key: REVIEW-DONE
        steps:
          - respond:
              - tool_call: { name: bash, args: { command: "echo 'fleet report: finding-A (reviewed)' > report.md" } }
              - finish: tool_use
          - respond:
              - text: "report assembled"
              - finish: end_turn
      - key: "researched:"
        steps:
          - respond:
              - tool_call: { name: spawn_agent, args: { agent: reviewer, prompt: REVIEW-JOB now } }
              - finish: tool_use
          - respond:
              - text: "waiting on the reviewer"
              - finish: end_turn
      - key: ""
        steps:
          - respond:
              - tool_call: { name: spawn_agent, args: { agent: researcher, prompt: RESEARCH-JOB now } }
              - finish: tool_use
          - respond:
              - text: "waiting on the researcher"
              - finish: end_turn
steps:
  - run: >
      AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/fleet.yaml
      $BIN run --workspace . lead.yaml "produce the report"
  - run: test "$(ls xdg/agentrunner/sessions/*/sub | wc -l)" -eq 2
  - run: grep -q report xdg/agentrunner/sessions/*/artifacts/manifest.json
expect:
  - exit_code: 0
  - file_contains: { path: report.md, text: "fleet report" }
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
  - events_valid: xdg/agentrunner/sessions/*/sub/*/events.jsonl
