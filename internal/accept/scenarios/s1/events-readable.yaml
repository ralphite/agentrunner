id: s1-02-events-readable
title: 每次 run 产生完整可读的事件日志(逐行 JSON envelope,seq 无缝隙)
files:
  spec.yaml: |
    name: chatter
    system_prompt: help
  fix.yaml: |
    steps:
      - respond:
          - text: "hello there"
          - finish: end_turn
steps:
  - run: AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/fix.yaml $BIN run --workspace . spec.yaml "say hi"
expect:
  - exit_code: 0
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
