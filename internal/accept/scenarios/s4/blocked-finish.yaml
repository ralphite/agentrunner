id: s4-04-blocked-finish
title: blocked/safety 收尾——文本保留、用户可见 error、可见截断(finish=blocked)
files:
  careful.yaml: |
    name: careful
    system_prompt: careful
    tools: [read_file]
  blocked.yaml: |
    steps:
      - respond:
          - text: "I cannot continue with that"
          - finish: blocked
steps:
  - run: >
      AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/blocked.yaml
      $BIN run --workspace . careful.yaml "do the thing" || test $? -eq 1
  - run: grep -q '"finish":"blocked"' xdg/agentrunner/sessions/*/events.jsonl
expect:
  - exit_code: 0
  - output_contains: "I cannot continue"
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
