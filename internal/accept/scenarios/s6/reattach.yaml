id: s6-04-reattach
title: daemon——submit 托管 run,事后 attach 从 journal 补读出同一故事
files:
  agent.yaml: |
    name: waver
    model: { provider: scripted, id: x, max_tokens: 100 }
    system_prompt: wave politely
    tools: [bash]
    permissions:
      - { action: allow }
  fix.yaml: |
    steps:
      - respond:
          - text: "hello from the daemon"
          - usage: { input_tokens: 20, output_tokens: 10 }
          - finish: end_turn
steps:
  - run: >
      AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/fix.yaml
      $BIN daemon >daemon.log 2>&1 &
      DPID=$!;
      i=0; until [ -S xdg/agentrunner/daemon.sock ] || [ $i -ge 50 ]; do sleep 0.1; i=$((i+1)); done;
      $BIN submit --workspace . agent.yaml "wave" >submit.out 2>&1;
      RC=$?;
      SESSION=$(ls xdg/agentrunner/sessions | head -1);
      $BIN attach --json "$SESSION" >attach.out 2>&1;
      RC2=$?;
      kill $DPID 2>/dev/null;
      test $RC -eq 0 && test $RC2 -eq 0
  - run: grep -q "hello from the daemon" submit.out
  - run: grep -q '"kind":"run_end"' attach.out && grep -q '"text":"hello from the daemon"' attach.out
expect:
  - exit_code: 0
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
