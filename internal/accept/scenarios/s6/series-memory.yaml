id: s6-02-series-memory
title: loop mode——series memory 注入:迭代 1 写下的记忆,迭代 2 的 task 里可见
files:
  driver.yaml: |
    name: rounds
    agent_spec: worker.yaml
    schedule: interval
    task: do the rounds
    max_iterations: 2
    series_memory: SERIES.md
  worker.yaml: |
    name: worker
    model: { provider: scripted, id: x, max_tokens: 100 }
    system_prompt: keep a series log
    tools: [bash]
    permissions:
      - { action: allow }
  series.yaml: |
    steps:
      - respond:
          - tool_call: { name: bash, args: { command: "echo remember-the-milk > SERIES.md" } }
          - usage: { input_tokens: 40, output_tokens: 20 }
          - finish: tool_use
      - respond:
          - text: "noted for next time"
          - usage: { input_tokens: 20, output_tokens: 10 }
          - finish: end_turn
      - expect: { last_message_contains: remember-the-milk }
        respond:
          - text: "picked up where I left off"
          - usage: { input_tokens: 20, output_tokens: 10 }
          - finish: end_turn
steps:
  - run: >
      AGENTRUNNER_SCRIPTED_FIXTURE=$SCRATCH/series.yaml
      $BIN drive --workspace . driver.yaml
  - run: grep -q '"type":"driver_completed"' xdg/agentrunner/sessions/*/events.jsonl
expect:
  - exit_code: 0
  - output_contains: "driver max_iterations: 2 iterations"
  - events_valid: xdg/agentrunner/sessions/*/events.jsonl
